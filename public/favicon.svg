<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dandelion favicon -->
  <circle cx="32" cy="32" r="32" fill="#1A1A18"/>
  <!-- Center sphere -->
  <circle cx="32" cy="32" r="5" fill="#C9A84C"/>
  <!-- Seed rays -->
  <g stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round">
    <!-- Top -->
    <line x1="32" y1="27" x2="32" y2="14"/>
    <ellipse cx="32" cy="12" rx="2.5" ry="3.5" fill="#C9A84C" stroke="none"/>
    <!-- Top-right -->
    <line x1="35.5" y1="28.5" x2="44" y2="18"/>
    <ellipse cx="45.5" cy="16.5" rx="2.5" ry="3.5" transform="rotate(40 45.5 16.5)" fill="#C9A84C" stroke="none"/>
    <!-- Right -->
    <line x1="37" y1="32" x2="50" y2="32"/>
    <ellipse cx="52" cy="32" rx="2.5" ry="3.5" transform="rotate(90 52 32)" fill="#C9A84C" stroke="none"/>
    <!-- Bottom-right -->
    <line x1="35.5" y1="35.5" x2="44" y2="46"/>
    <ellipse cx="45.5" cy="47.5" rx="2.5" ry="3.5" transform="rotate(140 45.5 47.5)" fill="#C9A84C" stroke="none"/>
    <!-- Bottom -->
    <line x1="32" y1="37" x2="32" y2="50"/>
    <ellipse cx="32" cy="52" rx="2.5" ry="3.5" transform="rotate(180 32 52)" fill="#C9A84C" stroke="none"/>
    <!-- Bottom-left -->
    <line x1="28.5" y1="35.5" x2="20" y2="46"/>
    <ellipse cx="18.5" cy="47.5" rx="2.5" ry="3.5" transform="rotate(-140 18.5 47.5)" fill="#C9A84C" stroke="none"/>
    <!-- Left -->
    <line x1="27" y1="32" x2="14" y2="32"/>
    <ellipse cx="12" cy="32" rx="2.5" ry="3.5" transform="rotate(-90 12 32)" fill="#C9A84C" stroke="none"/>
    <!-- Top-left -->
    <line x1="28.5" y1="28.5" x2="20" y2="18"/>
    <ellipse cx="18.5" cy="16.5" rx="2.5" ry="3.5" transform="rotate(-40 18.5 16.5)" fill="#C9A84C" stroke="none"/>
  </g>
</svg>
